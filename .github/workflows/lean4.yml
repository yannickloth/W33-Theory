name: Lean 4 CI

on:
  pull_request:
    branches: [ main, master ]
    paths:
      - "proofs/lean/**"
      - ".github/workflows/lean4.yml"
  push:
    branches: [ main, master ]
    paths:
      - "proofs/lean/**"
      - ".github/workflows/lean4.yml"
  workflow_dispatch:

concurrency:
  group: lean4-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lean-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: proofs/lean
    steps:
      - uses: actions/checkout@v4

      - name: Cache Lake packages and build
        uses: actions/cache@v4
        with:
          path: |
            proofs/lean/.lake/packages
            proofs/lean/.lake/build
          key: ${{ runner.os }}-lean4-${{ hashFiles('proofs/lean/lean-toolchain', 'proofs/lean/lakefile.lean', 'proofs/lean/proofs.lean', 'proofs/lean/z22_exclusion.lean') }}
          restore-keys: |
            ${{ runner.os }}-lean4-

      - name: Cache Elan toolchain
        uses: actions/cache@v4
        with:
          path: |
            ~/.elan
            ~/.cache/elan
          key: ${{ runner.os }}-elan-${{ hashFiles('proofs/lean/lean-toolchain') }}
          restore-keys: |
            ${{ runner.os }}-elan-

      - name: Install Elan and Lake (with retries)
        run: |
          set -eux
          # Install elan (Lean toolchain manager) and set up the environment
          if ! command -v elan >/dev/null 2>&1; then
            echo "Installing elan (with retry)"
            ATTEMPTS=4
            for i in $(seq 1 $ATTEMPTS); do
              # try primary URL first, fallback to GitHub releases URL
              if curl -sSfL https://raw.githubusercontent.com/leanprover-community/elan/master/elan-init.sh -o elan-init.sh || curl -sSfL https://github.com/leanprover/elan/releases/latest/download/elan-init.sh -o elan-init.sh; then
                if sh elan-init.sh -y; then
                  echo "elan installed successfully"
                  break
                else
                  echo "elan install script failed (attempt $i/$ATTEMPTS)"
                fi
              else
                echo "elan installer download failed (attempt $i/$ATTEMPTS)"
              fi
              if [ "$i" -lt "$ATTEMPTS" ]; then
                sleep $((i * 5))
              fi
            done
            if [ -d "$HOME/.elan/bin" ]; then
              export PATH="$HOME/.elan/bin:$PATH"
              # Make elan available to subsequent steps
              echo "$HOME/.elan/bin" >> $GITHUB_PATH
            else
              echo "elan not installed after $ATTEMPTS attempts; continuing without elan"
            fi
          else
            echo "elan already present"
          fi

          # Install the pinned toolchain if present (retry the elan toolchain install)
          if [ -f lean-toolchain ]; then
            TC="$(cat lean-toolchain)"
            if command -v elan >/dev/null 2>&1; then
              for j in 1 2 3; do
                if elan toolchain install --force "$TC" && elan default "$TC"; then
                  break
                fi
                echo "elan toolchain install attempt $j failed; retrying in $((j*5))s"
                sleep $((j * 5))
              done || true
            else
              echo "elan not available; cannot install pinned toolchain $TC"
            fi
          fi

          # Ensure lake is available; try to run it via elan if needed (with graceful fallback)
          if ! command -v lake >/dev/null 2>&1; then
            echo "lake not found after elan install; attempting to run via elan"
            if command -v elan >/dev/null 2>&1; then
              elan run -- lake --version || true
            else
              echo "elan not present; lake may be unavailable on this runner"
            fi
          fi

      - name: Generate conjugator Lean file and check committed copy
        working-directory: .
        run: |
          set -eux
          python scripts/generate_conjugators_lean.py
          # If the generated file differs from the committed copy, fail so maintainers can update
          if ! git diff --exit-code -- proofs/lean/conjugators_generated.lean; then
            echo "Generated conjugators differ from committed version. Run: python scripts/generate_conjugators_lean.py && git add proofs/lean/conjugators_generated.lean && git commit -m 'chore(gen): update conjugators_generated.lean' && git push"
            git --no-pager diff -- proofs/lean/conjugators_generated.lean || true
            exit 1
          fi

      - name: Sanity-check z22 Lean source
        run: |
          python - <<'PY'
          from pathlib import Path
          text = Path("z22_exclusion.lean").read_text(encoding="utf-8")
          non_ascii = sorted({ord(ch) for ch in text if ord(ch) > 127})
          if non_ascii:
              raise SystemExit(f"non-ascii codepoints found: {non_ascii}")
          required = [
              "theorem zMap_one",
              "theorem zMap_fixed_point_unique",
              "theorem zMap_involution",
              "theorem z22_contradiction_via_zMap",
              "theorem z22_contradiction_of_fixed_point_via_zMap",
              "theorem z22_no_fixed_point_stabilizer_via_zMap",
              # Candidate-based lemmas
              "theorem candidate_preserves_line_through_origin",
              "theorem z22_no_fixed_point_stabilizer_for_candidate_line_through_origin",
              "theorem z22_no_fixed_point_for_any_candidate",
          ]
          missing = [tok for tok in required if tok not in text]
          if missing:
              raise SystemExit(f"missing required Lean declarations: {missing}")
          print("z22_exclusion.lean sanity checks passed")
          PY

      - name: Check Docker availability
        id: docker_check
        run: |
          if docker info >/dev/null 2>&1; then
            echo "docker_available=true" >> $GITHUB_OUTPUT
          else
            echo "docker_available=false" >> $GITHUB_OUTPUT
          fi

      - name: Login to GHCR (if GHCR_TOKEN provided)
        if: ${{ secrets.GHCR_TOKEN != '' }}
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: No GHCR token (info)
        if: ${{ secrets.GHCR_TOKEN == '' }}
        run: |
          echo "GHCR_TOKEN not set; skipping GHCR login. To allow pulling protected images from ghcr.io, add a repository secret named GHCR_TOKEN (PAT with 'read:packages' scope)."

      - name: Containerized Lake build (when Docker available)
        if: steps.docker_check.outputs.docker_available == 'true'
        continue-on-error: true
        run: |
          set -eux
          MAX_ATTEMPTS=3
          SLEEP=10
          CANDIDATES=()
          # Prefer pinned toolchain if present
          if [ -f proofs/lean/lean-toolchain ]; then
            TC="$(cat proofs/lean/lean-toolchain | tr -d '[:space:]')"
            echo "Found toolchain pin: $TC"
            CANDIDATES+=("$TC")
            if ! echo "$TC" | grep -q '^ghcr.io/'; then
              CANDIDATES+=("ghcr.io/$TC")
            fi
          fi
          # Known stable public images to try (fallbacks)
          CANDIDATES+=("ghcr.io/leanprover/lean4:v4.22.0" "ghcr.io/leanprover/lean4:v4.21.1" "ghcr.io/leanprover/lean4:latest" "ghcr.io/leanprover/lean4:nightly")
          echo "Image candidates: ${CANDIDATES[*]}"

          IMAGE=""
          for IMG in "${CANDIDATES[@]}"; do
            attempt=1
            SLEEP=10
            echo "Attempting pull for $IMG"
            until docker pull "$IMG"; do
              if [ "$attempt" -ge "$MAX_ATTEMPTS" ]; then
                echo "docker pull failed for $IMG after $attempt attempts; moving to next candidate"
                break
              fi
              echo "docker pull failed for $IMG; retrying ($attempt/$MAX_ATTEMPTS) in $SLEEP s"
              sleep $SLEEP
              attempt=$((attempt+1))
              SLEEP=$((SLEEP*2))
            done
            if docker image inspect "$IMG" >/dev/null 2>&1; then
              IMAGE="$IMG"
              echo "Successfully pulled $IMG; using it for containerized build"
              break
            fi
          done

          if [ -z "$IMAGE" ]; then
            echo "No container image pulled from candidates; skipping containerized lake build"
          else
            attempt=1
            SLEEP=10
            until docker run --rm -v "${{ github.workspace }}":/workspace -w /workspace/proofs/lean "$IMAGE" /bin/sh -c "set -e; lake --version; lake update; lake exe cache get || echo 'cache missing'; lake build; lake env lean z22_exclusion.lean"; do
              if [ "$attempt" -ge "$MAX_ATTEMPTS" ]; then
                echo "docker run failed after $attempt attempts; continuing"
                break
              fi
              echo "docker run failed; retrying ($attempt/$MAX_ATTEMPTS) in $SLEEP s"
              sleep $SLEEP
              attempt=$((attempt+1))
              SLEEP=$((SLEEP*2))
            done
          fi


      - name: Build proofs with Lake (if available)
        run: |
          if command -v lake >/dev/null 2>&1; then
            lake --version
            lake update
            lake exe cache get || echo "mathlib cache unavailable; continuing with source build"
            lake build
            lake env lean z22_exclusion.lean
          elif command -v elan >/dev/null 2>&1; then
            echo "lake not found in PATH; attempting to run via elan"
            elan run -- lake --version || true
            elan run -- lake update || true
            elan run -- lake exe cache get || echo "mathlib cache unavailable; continuing with source build"
            elan run -- lake build || echo "elan-run lake build failed; continuing"
            elan run -- lake env lean z22_exclusion.lean || echo "elan-run lake env failed; continuing"
          else
            echo "lake and elan not found on runner; skipping Lean build (proofs won't be verified in CI until lake or elan is available)"
          fi
