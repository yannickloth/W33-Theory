name: Compute W33 automorphism orbits

on:
  workflow_dispatch: {}

jobs:
  compute-aut-orbits:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Compute automorphism orbits with Sage (docker run)
        env:
          GITHUB_WORKSPACE: ${{ github.workspace }}
        run: |
          docker pull sagemath/sagemath:latest
          docker run --rm -v "${{ github.workspace }}:/workspace" -w /workspace sagemath/sagemath:latest sage -python sage/compute_w33_aut_orbits.sage
      - name: Upload automorphism orbits artifact
        uses: actions/upload-artifact@v4
        with:
          name: PART_CXI_aut_orbits_sage
          path: checks/PART_CXI_aut_orbits_sage.json
