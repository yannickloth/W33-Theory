name: W33→E8 grid monitor

on:
  workflow_run:
    workflows:
      - "W33→E8 grid search"
    types:
      - completed

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Scan grid artifacts and open issue on found
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          REPO: ${{ github.repository }}
          RUN_URL: ${{ github.event.workflow_run.html_url }}
        run: |
          python scripts/scan_grid_artifacts.py --run-id "$RUN_ID" --repo "$REPO" --run-url "$RUN_URL" --open-issue
