name: Lean 4 Weekly Verification

on:
  schedule:
    # Weekly verification to ensure the Lean containerized build remains reliable
    - cron: '0 6 * * 0'  # Sunday 06:00 UTC
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: proofs/lean
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Check Docker availability (fail if absent)
        run: |
          if docker info >/dev/null 2>&1; then
            echo "Docker engine available"
          else
            echo "Docker is not available on this runner; failing verification"
            exit 1
          fi

      - name: Pull Lean container and run lake build (failing job)
        run: |
          set -eux
          MAX_ATTEMPTS=3
          SLEEP=10
          CANDIDATES=()
          # Prefer pinned toolchain if present
          if [ -f proofs/lean/lean-toolchain ]; then
            TC="$(cat proofs/lean/lean-toolchain | tr -d '[:space:]')"
            echo "Found toolchain pin: $TC"
            CANDIDATES+=("$TC")
            if ! echo "$TC" | grep -q '^ghcr.io/'; then
              CANDIDATES+=("ghcr.io/$TC")
            fi
          fi
          CANDIDATES+=("ghcr.io/leanprover/lean4:v4.22.0" "ghcr.io/leanprover/lean4:v4.21.1" "ghcr.io/leanprover/lean4:latest" "ghcr.io/leanprover/lean4:nightly")
          echo "Image candidates: ${CANDIDATES[*]}"

          IMAGE=""
          for IMG in "${CANDIDATES[@]}"; do
            attempt=1
            SLEEP=10
            echo "Attempting pull for $IMG"
            until docker pull "$IMG"; do
              if [ "$attempt" -ge "$MAX_ATTEMPTS" ]; then
                echo "docker pull failed for $IMG after $attempt attempts; moving to next candidate"
                break
              fi
              echo "docker pull failed for $IMG; retrying ($attempt/$MAX_ATTEMPTS) in $SLEEP s"
              sleep $SLEEP
              attempt=$((attempt+1))
              SLEEP=$((SLEEP*2))
            done
            if docker image inspect "$IMG" >/dev/null 2>&1; then
              IMAGE="$IMG"
              echo "Successfully pulled $IMG; using it for verification build"
              break
            fi
          done

          if [ -z "$IMAGE" ]; then
            echo "No container image available from candidates; failing verification job"
            exit 1
          fi

          docker run --rm -v "${{ github.workspace }}":/workspace -w /workspace/proofs/lean "$IMAGE" /bin/sh -c "set -e; lake --version; lake update; lake exe cache get || echo 'cache missing'; lake build; lake env lean z22_exclusion.lean"
