name: "perf: cubic_sym numba benchmark"

on:
  push:
    branches: [ master ]
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy pytest numba

      - name: Run cubic_sym benchmark (all modes)
        run: |
          python tools/bench_cubic_sym.py --iters 200 --warmup 20 --mode all | tee bench-output.txt

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: cubic_sym-benchmark
          path: bench-output.txt
