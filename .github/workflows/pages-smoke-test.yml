name: "Pages smoke test"

on:
  workflow_run:
    workflows: ["pages build and deployment"]
    types: [completed]

jobs:
  smoke:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Check Pages root (follow redirects)
        run: |
          URL="https://wilcompute.github.io/W33-Theory/"
          for i in {1..12}; do
            code=$(curl -s -o /dev/null -w "%{http_code}" -L "$URL")
            if [ "$code" = "200" ]; then
              echo "Pages root is available (HTTP 200)"
              exit 0
            fi
            echo "Attempt $i: site returned $code — retrying in 5s..."
            sleep 5
          done
          echo "ERROR: Pages root still not serving HTTP 200 after retries"
          exit 1
